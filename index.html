<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .calculadora-card {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 12px;
            border: none;
            background-color: white;
        }
        .resultado-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 5px solid #0d6efd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-4">
                <div class="calculadora-card p-4">
                    <h4 class="text-center mb-4 text-primary">Calculadora de Descuento</h4>
                    
                    <div class="mb-3">
                        <label for="precio" class="form-label fw-bold">Precio Original</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="precio" placeholder="Ej: 10.00" step="0.01" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descuento" class="form-label fw-bold">Descuento (%)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="descuento" placeholder="Ej: 10" step="1" min="0" max="100">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="iva" class="form-label fw-bold">Impuesto / IVA (%)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="iva" placeholder="Ej: 13" value="0" step="0.1" min="0">
                            <span class="input-group-text">%</span>
                        </div>
                        <div class="form-text">Déjalo en 0 si no aplica impuesto.</div>
                    </div>
                    
                    <button class="btn btn-primary w-100 fw-bold" onclick="calcular()">Calcular</button>

                    <div class="resultado-box d-none" id="caja-resultado">
                        <h5 class="text-success mb-2">Precio Final: $<span id="precio-final">0.00</span></h5>
                        <p class="text-secondary mb-1 fw-bold">Total Ahorrado: $<span id="total-ahorrado">0.00</span></p>
                        <p class="text-muted mb-0 small d-none" id="texto-iva">Incluye $<span id="monto-iva">0.00</span> de impuesto.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcular() {
            const precio = parseFloat(document.getElementById('precio').value);
            const descuento = parseFloat(document.getElementById('descuento').value);
            // Capturamos el valor manual del IVA
            const porcentajeIva = parseFloat(document.getElementById('iva').value);
            
            const cajaResultado = document.getElementById('caja-resultado');
            const textoIva = document.getElementById('texto-iva');

            // Validamos que los tres campos tengan números válidos
            if (isNaN(precio) || isNaN(descuento) || isNaN(porcentajeIva) || precio < 0 || descuento < 0 || porcentajeIva < 0) {
                alert("Por favor, ingresa valores numéricos válidos y mayores a cero.");
                return;
            }

            const totalAhorrado = precio * (descuento / 100);
            let precioFinal = precio - totalAhorrado;
            let montoIva = 0;

            // Lógica matemática para el IVA dinámico
            if (porcentajeIva > 0) {
                // Se calcula el monto del impuesto usando el porcentaje ingresado
                montoIva = precioFinal * (porcentajeIva / 100);
                precioFinal += montoIva; // Se suma al precio final
                
                document.getElementById('monto-iva').innerText = montoIva.toFixed(2);
                textoIva.classList.remove('d-none'); // Muestra el texto de desglose
            } else {
                textoIva.classList.add('d-none'); // Oculta el texto si el IVA es 0
            }

            document.getElementById('precio-final').innerText = precioFinal.toFixed(2);
            document.getElementById('total-ahorrado').innerText = totalAhorrado.toFixed(2);
            
            cajaResultado.classList.remove('d-none');

            }
    </script>
</body>
</html>
