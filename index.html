<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Descuentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9; /* Color de fondo suave */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .calculadora-card {
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            border-radius: 12px;
            border: none;
            background-color: white;
        }
        .resultado-box {
            background-color: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 5px solid #0d6efd;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-11 col-md-6 col-lg-4">
                <div class="calculadora-card p-4">
                    <h4 class="text-center mb-4 text-primary">Calculadora de Descuento</h4>
                    
                    <div class="mb-3">
                        <label for="precio" class="form-label fw-bold">Precio Original</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" id="precio" placeholder="Ej: 1.00" step="0.01" min="0">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="descuento" class="form-label fw-bold">Descuento (%)</label>
                        <div class="input-group">
                            <input type="number" class="form-control" id="descuento" placeholder="Ej: 10" step="1" min="0" max="100">
                            <span class="input-group-text">%</span>
                        </div>
                    </div>
                    
                    <button class="btn btn-primary w-100 fw-bold" onclick="calcular()">Calcular Descuento</button>

                    <div class="resultado-box d-none" id="caja-resultado">
                        <h5 class="text-success mb-2">Precio a Pagar: $<span id="precio-final">0.00</span></h5>
                        <p class="text-secondary mb-0 fw-bold">Total Ahorrado: $<span id="total-ahorrado">0.00</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcular() {
            // 1. Obtener los valores ingresados por el usuario
            const precio = parseFloat(document.getElementById('precio').value);
            const descuento = parseFloat(document.getElementById('descuento').value);
            const cajaResultado = document.getElementById('caja-resultado');

            // 2. Validar que los datos sean números válidos y mayores a cero
            if (isNaN(precio) || isNaN(descuento) || precio < 0 || descuento < 0) {
                alert("Por favor, ingresa valores numéricos válidos.");
                return; // Detiene la función si hay error
            }

            // 3. Realizar las operaciones matemáticas
            // Ahorro = Precio Original * (Porcentaje de Descuento / 100)
            const totalAhorrado = precio * (descuento / 100);
            
            // Precio Final = Precio Original - Ahorro
            const precioFinal = precio - totalAhorrado;

            // 4. Mostrar los resultados en la pantalla, fijando 2 decimales
            document.getElementById('precio-final').innerText = precioFinal.toFixed(2);
            document.getElementById('total-ahorrado').innerText = totalAhorrado.toFixed(2);
            
            // 5. Quitar la clase 'd-none' para que la caja de resultados sea visible
            cajaResultado.classList.remove('d-none');
        }
    </script>
</body>
</html>
